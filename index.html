// ── Offline queue ──────────────────────────────────
var QUEUE_KEY = "rebost_offline_queue";
function getQueue(){ try{ return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); }catch(e){ return []; } }
function saveQueue(q){ try{ localStorage.setItem(QUEUE_KEY,JSON.stringify(q)); }catch(e){} }
function addToQueue(op){ var q=getQueue(); q.push(op); saveQueue(q); }

async function syncQueue(userId){
  var q=getQueue(); if(!q.length) return 0;
  var failed=[];
  for(var i=0;i<q.length;i++){
    var op=q[i];
    try{
      if(op.type==="add") await sb.from("wines").insert({winery:op.winery,name:op.name,rating:op.rating,user_id:userId});
      else if(op.type==="delete") await sb.from("wines").delete().eq("id",op.id);
      else if(op.type==="rate") await sb.from("wines").update({rating:op.rating}).eq("id",op.id);
    }catch(e){ failed.push(op); }
  }
  saveQueue(failed);
  return q.length-failed.length;
}

                          h("div",{className:"lrank",style:{background:rankColor(i)}},i+1),
                          h("div",{className:"linfo"},
                            h("div",{className:"lwine"},w.name),
                            h("div",{className:"lwinery"},w.winery)
                          ),
                          h(Stars,{rating:w.rating,readOnly:true,size:13}),
                          h("button",{className:"delbtn",style:{marginLeft:8},onClick:function(){setDeleteFromList(w);}},IC.close)
                        );
                      })),
                  deleteFromList&&h(Sheet,{onClose:function(){setDeleteFromList(null);},title:"Eliminar vi",
                    text:'Segur que vols eliminar "'+deleteFromList.name+'" de '+deleteFromList.winery+'?'},
                    h("div",{className:"sbtns"},
                      h("button",{className:"scancel",onClick:function(){setDeleteFromList(null);}},"Cancel.lar"),
                      h("button",{className:"sconfirm",style:{background:DANGER},
                        onClick:function(){deleteWine(deleteFromList.winery,deleteFromList.id);setDeleteFromList(null);}
                      },"Eliminar")
                    )
                  )
                )
          ),

          // EXPORTAR
          tab==="exportar"&&h("div",{className:"ewrap",style:{marginTop:16}},
            h("div",{className:"ecard"},
              h("div",{className:"estat"},"Tens ",h("strong",null,allWines.length+" vins")," anotats de ",h("strong",null,wineriesWithWines+" cellers"),"."),
              h("button",{className:"ebtn pr",onClick:exportPDF},IC.pdf," Descarrega PDF"),
              h("button",{className:"ebtn sc",onClick:shareWhatsapp},IC.chat," Comparteix per WhatsApp"),
              h("button",{className:"ebtn sc",onClick:copyList},IC.copy," Copia al porta-retalls")
            ),
            allWines.length>0&&h("div",{className:"ecard"},
              h("div",{className:"slbl",style:{padding:"0 0 12px"}},"Previsualitzaci\u00f3"),
              h("div",{className:"prevbox"},allWines.map(function(w,i){
                return h("div",{key:w.id,className:"prevrow"},
                  h("div",null,h("div",{className:"pwine"},(i+1)+". "+w.name),h("div",{className:"pwinery"},w.winery)),
                  h("div",{className:"pstars"},w.rating?"\u2605".repeat(w.rating):"–")
                );
              }))
            )
          ),

          // PERFIL
          tab==="perfil"&&h("div",{className:"prwrap",style:{marginTop:16}},
            h("div",{className:"prcard"},
              h("div",{className:"prav"},userAvatar?h("img",{src:userAvatar,alt:userName}):userInitial),
              h("div",{className:"prname"},userName),
              h("div",{className:"premail"},user.email),
              h("div",{className:"strow"},
                h("div",{className:"stbox"},h("div",{className:"stnum"},allWines.length),h("div",{className:"stlbl"},"Vins")),
                h("div",{className:"stbox"},h("div",{className:"stnum"},wineriesWithWines),h("div",{className:"stlbl"},"Cellers")),
                h("div",{className:"stbox"},h("div",{className:"stnum am"},avgRating),h("div",{className:"stlbl"},"Mitjana"))
              ),
              h("button",{className:"logbtn",onClick:logout},IC.logout," Tanca la sessi\u00f3")
            ),
            h("div",{className:"badge"},
              h("p",null,h("strong",null,"Que Rebenti La Baells"),"Fira del Vi \u00b7 17 de maig de 2026",h("br"),"41 cellers participants")
            )
          )
        ),

        h("div",{className:"tabbar"},tabs.map(function(t){
          return h("button",{key:t.id,className:"tab "+(tab===t.id&&!selected?"on":"off"),
            onClick:function(){setTab(t.id);setSelected(null);}},
            t.icon,h("span",{className:"tab-lbl"},t.label));
        })),

        toast&&h("div",{className:"toast"},toast)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
