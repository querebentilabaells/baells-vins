<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --mint:#00E5A8;--mint-d:#00C994;--mint-pale:#E6FFF8;
  --black:#0A0A0A;--white:#FFFFFF;--gray1:#1A1A1A;--gray2:#3D3D3D;
  --gray3:#767676;--gray4:#ADADAD;--gray5:#E5E5E5;--gray6:#F6F6F6;
  --radius:14px;--radius-sm:10px;--radius-full:100px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--black);display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden;}
.scr.vis{display:flex;}

/* ── ONBOARDING ── */
#s-onboard{background:var(--black);}
.ob-visual{flex:1;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2rem;}
.ob-bg{position:absolute;inset:0;background:var(--mint);clip-path:ellipse(85% 70% at 50% 30%);}
.ob-title-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,15vw,72px);line-height:.92;color:var(--black);text-align:center;position:relative;z-index:1;letter-spacing:.01em;}
.ob-title-big span{color:var(--white);}
.ob-bottom{background:var(--black);padding:1.5rem 1.5rem 2rem;flex-shrink:0;}
.ob-tagline{font-size:15px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:1.5rem;}
.ob-tagline strong{color:var(--mint);}
.btn-google{width:100%;padding:16px;background:var(--white);color:var(--black);border:none;border-radius:var(--radius-full);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:transform .15s,opacity .15s;}
.btn-google:active{transform:scale(.97);opacity:.9;}


/* ── APP SHELL ── */
#s-app{flex-direction:column;}
.app-hdr{background:var(--white);padding:.9rem 1.25rem .75rem;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--gray5);flex-shrink:0;z-index:10;}
.hdr-back{width:38px;height:38px;border-radius:var(--radius-full);border:none;background:var(--gray6);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0;color:var(--black);}
.hdr-back.vis{display:flex;}
.hdr-center{flex:1;text-align:center;}
.hdr-eye{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray3);margin-bottom:1px;}
.hdr-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--black);letter-spacing:.03em;line-height:1;}
.hdr-ttl em{color:var(--mint-d);}
/* avatar usuari al header */
.hdr-user{width:32px;height:32px;border-radius:var(--radius-full);overflow:hidden;flex-shrink:0;background:var(--gray6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gray3);border:1.5px solid var(--gray5);}
.hdr-user img{width:100%;height:100%;object-fit:cover;}

.save-bar{text-align:center;padding:3px 0 1px;font-size:10px;font-weight:500;letter-spacing:.04em;min-height:16px;transition:color .3s;color:var(--gray3);}
.save-bar.saving{color:var(--gray3);}
.save-bar.saved{color:var(--mint-d);}
.save-bar.error{color:#E05A5A;}
.app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.25rem 5rem;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1.5px solid var(--gray5);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav.vis{display:flex;}
.nb{flex:1;padding:10px 6px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--gray3);}
.nb.on{color:var(--black);}
.nb svg{width:22px;height:22px;}
.nb-iw{position:relative;}
.nbadge{position:absolute;top:-4px;right:-8px;background:var(--mint-d);color:var(--black);font-size:9px;font-weight:700;border-radius:var(--radius-full);padding:1px 5px;min-width:17px;text-align:center;display:none;}
.nbadge.vis{display:block;}

/* ── EXPLORE ── */
.search-w{position:relative;margin-bottom:.85rem;}
.s-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray3);pointer-events:none;}
.s-inp{width:100%;padding:13px 14px 13px 44px;border:none;border-radius:var(--radius-full);background:var(--gray6);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);outline:none;}
.s-inp::placeholder{color:var(--gray4);}
.s-inp:focus{background:#EFEFEF;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:1rem;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 16px;border-radius:var(--radius-full);border:1.5px solid var(--gray5);background:var(--white);font-size:13px;font-weight:500;color:var(--gray2);cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--black);color:var(--white);border-color:var(--black);}
.bod-list{display:flex;flex-direction:column;gap:8px;}
.bod-row{background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:background .12s;}
.bod-row:active{background:var(--gray6);}
.bod-row.sel{border-color:var(--mint-d);background:var(--mint-pale);}
.bod-av{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--gray6);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--black);flex-shrink:0;}
.bod-row.sel .bod-av{background:var(--black);color:var(--mint);}
.bod-info{flex:1;min-width:0;}
.bod-name{font-size:14px;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bod-count{font-size:12px;color:var(--gray3);margin-top:1px;}
.bod-row.sel .bod-count{color:var(--mint-d);}
.bod-arr{color:var(--gray4);font-size:20px;flex-shrink:0;}
.no-res{text-align:center;padding:3rem 1rem;color:var(--gray3);font-size:14px;}

/* ── DETAIL ── */
.hero{background:var(--black);border-radius:var(--radius);padding:18px;margin-bottom:1rem;display:flex;align-items:center;gap:13px;}
.hero-av{width:48px;height:48px;border-radius:var(--radius-sm);background:var(--mint);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--black);flex-shrink:0;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);letter-spacing:.02em;line-height:1.1;}
.hero-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}
.add-card{background:var(--gray6);border-radius:var(--radius);padding:14px;margin-bottom:1rem;}
.add-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray3);margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-bottom:10px;}
.wi-inp{flex:1;border:none;border-radius:var(--radius-full);padding:12px 16px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);outline:none;box-shadow:0 0 0 1.5px var(--gray5);transition:box-shadow .15s;}
.wi-inp:focus{box-shadow:0 0 0 2px var(--mint-d);}
.wi-inp::placeholder{color:var(--gray4);}
.btn-add{background:var(--black);color:var(--white);border:none;border-radius:var(--radius-full);padding:0 18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-add:active{background:var(--gray1);}
.notes-inp{width:100%;border:none;border-radius:var(--radius-sm);padding:12px 14px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--black);resize:none;outline:none;box-shadow:0 0 0 1.5px var(--gray5);transition:box-shadow .15s;}
.notes-inp:focus{box-shadow:0 0 0 2px var(--mint-d);}
.notes-inp::placeholder{color:var(--gray4);}
.stars-row{display:flex;align-items:center;gap:5px;margin-top:10px;}
.s-lbl{font-size:12px;color:var(--gray3);margin-right:2px;}
.star{font-size:24px;color:var(--gray5);cursor:pointer;user-select:none;line-height:1;}
.star.lit{color:#1A1A1A;}
.wine-entries{display:flex;flex-direction:column;gap:8px;}
.wine-card{background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);padding:13px 14px;}
.wc-top{display:flex;align-items:center;gap:10px;}
.wc-num{width:26px;height:26px;border-radius:var(--radius-full);background:var(--black);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--mint);flex-shrink:0;}
.wc-name{flex:1;font-size:14px;font-weight:600;color:var(--black);}
.wc-del{width:28px;height:28px;border-radius:var(--radius-full);border:none;background:var(--gray6);color:var(--gray3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.wc-notes{font-size:12px;color:var(--gray3);margin-top:6px;padding-left:36px;line-height:1.5;}
.wc-stars{padding-left:34px;margin-top:4px;font-size:13px;color:var(--black);}
.empty-detail{border:1.5px dashed var(--gray4);border-radius:var(--radius);padding:1.5rem;text-align:center;color:var(--gray3);font-size:13px;line-height:1.7;background:var(--gray6);}

/* ── MY LIST ── */
.sec-ttl{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--black);margin-bottom:1rem;border-bottom:2px solid var(--black);padding-bottom:.4rem;letter-spacing:.02em;}
.list-bod{background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.lb-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.lb-head:active{background:var(--gray6);}
.lb-av{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--black);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--mint);flex-shrink:0;}
.lb-name{flex:1;font-size:13px;font-weight:600;}
.lb-badge{background:var(--mint-pale);color:var(--mint-d);font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);border:1px solid var(--mint-d);}
.lb-chev{color:var(--gray3);font-size:18px;transition:transform .2s;display:inline-block;}
.lb-chev.open{transform:rotate(90deg);}
.lb-wines{padding:0 14px 12px;display:none;flex-direction:column;gap:6px;}
.lb-wines.open{display:flex;}
.lb-wi{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--gray6);border-radius:var(--radius-sm);}
.lb-wi-n{width:20px;height:20px;border-radius:var(--radius-full);background:var(--black);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--mint);flex-shrink:0;margin-top:1px;}
.lb-wi-body{flex:1;}
.lb-wi-name{font-size:13px;font-weight:600;color:var(--black);}
.lb-wi-notes{font-size:11px;color:var(--gray3);margin-top:2px;}
.lb-wi-stars{font-size:12px;color:var(--black);margin-top:2px;}
.empty-list{text-align:center;padding:3rem 1.5rem;}
.el-ico{font-size:44px;margin-bottom:.75rem;display:block;opacity:.25;}
.el-txt{font-size:14px;color:var(--gray3);line-height:1.7;}

/* ── EXPORT ── */
.exp-card{background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
.exp-head{background:var(--black);padding:18px;display:flex;align-items:center;gap:12px;}
.exp-head-ico{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.exp-head-t{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);letter-spacing:.02em;}
.exp-head-s{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.exp-rows{padding:0 16px;}
.exp-row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--gray5);font-size:13px;}
.exp-row:last-child{border:none;}
.exp-rl{color:var(--gray3);}
.exp-rv{font-weight:600;}
.exp-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;}
.btn-exp{width:100%;padding:17px;border:none;border-radius:var(--radius-full);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .12s,transform .12s;}
.btn-exp.whatsapp{background:#25D366;color:#fff;}
.btn-exp.whatsapp:active{background:#1ebe5d;transform:scale(.98);}
.btn-exp.excel{background:var(--black);color:var(--white);}
.btn-exp.excel:active{transform:scale(.98);}
.btn-exp.pdf{background:var(--mint);color:var(--black);}
.btn-exp.pdf:active{background:var(--mint-d);transform:scale(.98);}
.btn-exp.logout{background:var(--gray6);color:#E05A5A;border:1.5px solid #ffd0d0;}
.btn-exp.logout:active{background:#fff0f0;}
.exp-note{font-size:11px;color:var(--gray3);text-align:center;margin-top:.5rem;line-height:1.65;}
/* user info card a export */
.user-card{background:var(--mint-pale);border:1.5px solid var(--mint-d);border-radius:var(--radius);padding:14px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
.user-card-av{width:40px;height:40px;border-radius:var(--radius-full);overflow:hidden;flex-shrink:0;background:var(--mint-d);display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:16px;}
.user-card-av img{width:100%;height:100%;object-fit:cover;}
.user-card-name{font-size:14px;font-weight:600;color:var(--black);}
.user-card-email{font-size:11px;color:var(--gray3);margin-top:1px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--black);color:var(--white);padding:10px 20px;border-radius:var(--radius-full);font-size:13px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#pdf-source{position:fixed;left:-9999px;top:0;width:794px;background:white;font-family:Arial,sans-serif;padding:48px 52px;font-size:13px;line-height:1.6;color:#111;}
#pdf-source h1{font-size:28px;font-weight:900;letter-spacing:.04em;margin-bottom:2px;text-transform:uppercase;}
#pdf-source .pdf-sub{font-size:11px;color:#666;margin-bottom:4px;}
#pdf-source .pdf-date{font-size:10px;color:#999;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid #0A0A0A;}
#pdf-source .pdf-bodega{margin-bottom:20px;}
#pdf-source .pdf-bodega-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0A0A0A;padding:6px 0;border-bottom:1.5px solid #0A0A0A;margin-bottom:8px;}
#pdf-source .pdf-wine{display:flex;align-items:baseline;gap:10px;padding:5px 0;border-bottom:1px solid #eee;}
#pdf-source .pdf-wine:last-child{border-bottom:none;}
#pdf-source .pdf-wine-num{font-size:10px;font-weight:700;color:#00C994;width:18px;flex-shrink:0;}
#pdf-source .pdf-wine-name{font-size:13px;font-weight:600;flex:1;}
#pdf-source .pdf-wine-stars{font-size:12px;color:#555;flex-shrink:0;}
#pdf-source .pdf-wine-notes{font-size:11px;color:#666;padding:2px 0 5px 28px;}
#pdf-source .pdf-footer{margin-top:32px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#aaa;text-align:center;}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div class="scr vis" id="s-onboard">
  <div class="ob-visual">
    <div class="ob-bg"></div>
    <div class="ob-title-big">QUE<br>REBENTI<br><span>LA BAELLS</span></div>
  </div>
  <div class="ob-bottom">
    <p class="ob-tagline">Anota els vins que t'agradin de la fira i <strong>genera el teu rebost 2026</strong>. Les dades es guarden al teu compte de Google.</p>

    </button>

</div>

<!-- APP -->
<div class="scr" id="s-app">
  <div class="app-hdr">
    <button class="hdr-back" id="btnBack" onclick="goBack()">←</button>
    <div class="hdr-center">
      <div class="hdr-eye" id="hdrEye">Fira del Vi · 17 de maig 2026</div>
      <div class="hdr-ttl" id="hdrTtl">QUE REBENTI <em>LA BAELLS</em></div>
    </div>
    <!-- Avatar usuari -->
    <div class="hdr-user" id="hdrUser" title="Usuari">?</div>
  </div>
  <div class="save-bar" id="saveBar"></div>
  <div class="app-body" id="appBody"></div>
  <div class="bnav vis" id="bnav">
    <button class="nb on" id="nb-explore" onclick="goNav('explore')">
      <div class="nb-iw">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M9 12L11.5 14.5L15.5 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      Cellers
    </button>
    <button class="nb" id="nb-list" onclick="goNav('list')">
      <div class="nb-iw">
        <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="14" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M8 10H16M8 14H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <div class="nbadge" id="listBadge"></div>
      </div>
      La meva llista
    </button>
    <button class="nb" id="nb-export" onclick="goNav('export')">
      <div class="nb-iw">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5V15M12 15L9 12M12 15L15 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 18H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      Exportar
    </button>
  </div>
</div>

<div id="pdf-source"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG SUPABASE

var currentUser = null; // null = anònim

async function loginGoogle() {
  await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://querebentilabaells.cat/' }
  });
}

async function logout() {
  await sbClient.auth.signOut();
  currentUser = null;
  localStorage.removeItem(LS_UID);
  localStorage.removeItem(LS_KEY);
  // Torna a onboarding
  document.getElementById('s-app').classList.remove('vis');
  document.getElementById('s-onboard').classList.add('vis');
  showToast('Sessi\u00f3 tancada');
}

// Comprova si hi ha sessió activa (Google) o anònim
async function checkAuth() {
  var { data } = await sbClient.auth.getSession();
  if (data && data.session && data.session.user) {
    currentUser = data.session.user;
    // Si hi havia dades pendents de fusió (anònim → Google), les migrem
    var pending = localStorage.getItem('wf_pending_merge');
    if (pending && pending !== '{}') {
      try {
        var pendingData = JSON.parse(pending);
        if (Object.keys(pendingData).length > 0) {
          await mergePendingData(pendingData);
        }
      } catch(e) {}
      localStorage.removeItem('wf_pending_merge');
    }
    updateUserUI();
    return true; // té sessió Google
  }
  currentUser = null;
  return false;
}

// Fusiona dades anònimes al compte Google
async function mergePendingData(pendingData) {
  try {
    // Carrega dades existents del compte Google
    var existing = await sbFind(currentUser.id);
    if (existing && existing.wine_data && Object.keys(existing.wine_data).length > 0) {
      // Ja té dades → no sobreescrivim, fusionem
      var merged = Object.assign({}, pendingData, existing.wine_data);
      if (existing.id) {
        await sbUpdate(existing.id, merged, currentUser.id);
      }
    } else {
      // Compte nou → pujem les dades locals
      if (existing) {
        await sbUpdate(existing.id, pendingData, currentUser.id);
      } else {
        await sbCreate(pendingData, currentUser.id);
      }
    }
  } catch(e) { console.warn('Merge failed:', e); }
}

// Actualitza avatar i nom al header
function updateUserUI() {
  var el = document.getElementById('hdrUser');
  if (!el) return;
  if (currentUser) {
    var meta = currentUser.user_metadata || {};
    var avatar = meta.avatar_url || meta.picture || '';
    var name   = meta.full_name || meta.name || currentUser.email || 'G';
    if (avatar) {
      el.innerHTML = '<img src="' + avatar + '" alt="' + name + '">';
    } else {
      el.textContent = name.charAt(0).toUpperCase();
    }
    el.title = name;
  } else {
    el.textContent = '?';
    el.title = 'An\u00f2nim';
  }
}

function getEffectiveUserId() {

}

//  STORAGE SERVICE
// ═══════════════════════════════════════════════════════════
var SS = (function () {
  var rowId = null, timer = null;

  function setStatus(s) {
    var el = document.getElementById('saveBar'); if (!el) return;
    var map = {
      saving : { t: 'Guardant\u2026', c: 'saving' },
      saved  : { t: 'Guardat \u2713',  c: 'saved'  },
      error  : { t: 'Error al guardar \u00b7 guardat en aquest dispositiu', c: 'error' },
      offline: { t: 'Sense connexi\u00f3 \u00b7 guardat en aquest dispositiu', c: 'error' },
    };
    var x = map[s] || map.saved;
    el.textContent = x.t; el.className = 'save-bar ' + x.c;
    if (s === 'saved') setTimeout(function(){ el.textContent=''; el.className='save-bar'; }, 2500);
  }

  function saveLocal(d) { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e){} }
  function loadLocal()  { try { var r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null; } catch(e){ return null; } }

  async function persist(data) {
    var uid = getEffectiveUserId();
    if (!uid) return; // sense login no guardem
    saveLocal(data);
    setStatus('saving');
    try {
      if (rowId) {
        await sbUpdate(rowId, data, uid);
      } else {
        var ex = await sbFind(uid);
        if (ex) { rowId = ex.id; await sbUpdate(rowId, data, uid); }
        else     { var cr = await sbCreate(data, uid); rowId = cr.id; }
      }
      setStatus('saved');
    } catch(e) {
      console.warn('[SS]', e.message);
      setStatus(navigator.onLine ? 'error' : 'offline');
    }
  }

  function scheduleSave(data) {
    clearTimeout(timer);
    timer = setTimeout(function(){ persist(data); }, 1500);
  }

  async function init() {
    rowId = null;
    var uid = getEffectiveUserId();
    if (!uid) return {}; // no autenticat, llista buida
    try {
      var row = await sbFind(uid);
      if (row) { rowId = row.id; var d = row.wine_data||{}; saveLocal(d); return d; }
    } catch(e) { console.warn('[SS] load failed, using localStorage'); }
    return loadLocal() || {};
  }

  return {
    init,
    getShareUrl: function(){
      return window.location.href.split('?')[0]; // URL neta, les dades estan al compte Google
    },
    save: scheduleSave,
  };
})();

// ═══════════════════════════════════════════════════════════
function hdrs() {
  var h = { 'Content-Type':'application/json', 'apikey':SB_ANON, 'Authorization':'Bearer '+SB_ANON };
  // Si autenticat amb Google, usa el token de sessió
  if (currentUser) {
    sbClient.auth.getSession().then(function(r){
      if (r.data && r.data.session) h['Authorization'] = 'Bearer ' + r.data.session.access_token;
    });
  }
  return h;
}

async function sbFind(uid) {
  try {
    var r = await fetch(SB_URL+'/rest/v1/'+SB_TABLE+'?user_id=eq.'+uid+'&select=id,wine_data&limit=1',
      { headers: hdrs(), signal: AbortSignal.timeout(6000) });
    if (!r.ok) return null;
    var rows = await r.json(); return rows.length ? rows[0] : null;
  } catch(e) { return null; }
}

async function sbCreate(data, uid) {
  var r = await fetch(SB_URL+'/rest/v1/'+SB_TABLE, {
    method:'POST', headers:Object.assign({'Prefer':'return=representation'}, hdrs()),
    body: JSON.stringify({ user_id: uid, wine_data: data }),
    signal: AbortSignal.timeout(6000)
  });
  if (!r.ok) throw new Error('SB INSERT '+r.status);
  var rows = await r.json(); return rows[0];
}

async function sbUpdate(id, data, uid) {
  var r = await fetch(SB_URL+'/rest/v1/'+SB_TABLE+'?id=eq.'+id, {
    method:'PATCH', headers:Object.assign({'Prefer':'return=representation'}, hdrs()),
    body: JSON.stringify({ wine_data: data }),
    signal: AbortSignal.timeout(6000)
  });
  if (!r.ok) throw new Error('SB UPDATE '+r.status);
  var rows = await r.json(); return rows[0];
}

function filterBodegas() {
  var q=(document.getElementById('searchInp')||{value:''}).value.toLowerCase().trim();
  var idxs=[];
  for(var i=0;i<BODEGAS.length;i++){
    if(q&&BODEGAS[i].toLowerCase().indexOf(q)===-1) continue;
    if(chipMode==='sel'&&(!wineData[i]||!wineData[i].length)) continue;
    idxs.push(i);
  }
  var grid=document.getElementById('bodList'),noRes=document.getElementById('noRes');
  if(!grid) return;
  if(!idxs.length){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  grid.innerHTML=idxs.map(function(idx){
    var b=BODEGAS[idx],w=wineData[idx]||[],s=w.length>0;
    return '<div class="bod-row'+(s?' sel':'')+'" onclick="openBodega('+idx+')">'
      +'<div class="bod-av">'+b.charAt(0)+'</div>'
      +'<div class="bod-info"><div class="bod-name">'+b+'</div>'
      +'<div class="bod-count">'+(s?w.length+' vi'+(w.length>1?'ns anotats':' anotat'):'Toca per anotar vins')+'</div></div>'
      +'<div class="bod-arr">\u203a</div></div>';
  }).join('');
}

function openBodega(idx) {

function renderDetail() {

  var stars=''; for(var i=1;i<=5;i++) stars+='<span class="star" id="ds'+i+'" onclick="setDStar('+i+')">\u2605</span>';
  var entries=wines.length?wines.map(function(w,j){return wineCardHTML(w,j+1);}).join('')

    +'<div class="wine-entries" id="wineEntries">'+entries+'</div>';
  var w=document.getElementById('wineInp');
  if(w){w.addEventListener('keydown',function(e){if(e.key==='Enter')addWine();});w.focus();}

function setDStar(v) {
  dStar=v; for(var i=1;i<=5;i++){var el=document.getElementById('ds'+i);if(el)el.classList.toggle('lit',i<=v);}
}

function addWine() {
  var nEl=document.getElementById('wineInp'),notEl=document.getElementById('notesInp');
  if(!nEl) return;
  var name=nEl.value.trim(); if(!name){nEl.focus();return;}
  var wine={id:Date.now(),name:name,notes:notEl?notEl.value.trim():'',rating:dStar};
  if(!wineData[curIdx]) wineData[curIdx]=[];
  wineData[curIdx].push(wine);
  nEl.value=''; if(notEl)notEl.value=''; dStar=0;
  for(var i=1;i<=5;i++){var el=document.getElementById('ds'+i);if(el)el.classList.remove('lit');}
  var wines=wineData[curIdx],hs=document.getElementById('heroSub');
  if(hs) hs.textContent=wines.length+' vi'+(wines.length>1?'ns anotats':' anotat');
  var ee=document.getElementById('wineEntries');
  if(ee) ee.innerHTML=wines.map(function(w,j){return wineCardHTML(w,j+1);}).join('');
  updateBadge(); save(); showToast('Vi afegit \u2713'); if(nEl)nEl.focus();
}

function wineCardHTML(w,n) {
  var s=''; if(w.rating) for(var i=1;i<=5;i++) s+=(w.rating>=i?'\u2605':'\u2606');
  return '<div class="wine-card"><div class="wc-top">'
    +'<div class="wc-num">'+n+'</div><div class="wc-name">'+w.name+'</div>'
    +'<button class="wc-del" onclick="delWine('+w.id+')">\u00d7</button></div>'
    +(w.notes?'<div class="wc-notes">'+w.notes+'</div>':'')
    +(w.rating?'<div class="wc-stars">'+s+'</div>':'')+'</div>';
}

    +(currentUser?'<button class="btn-exp logout" onclick="logout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Tancar sessi\u00f3</button>':'')
    +'</div>'
    +'<p class="exp-note">El bot\u00f3 verd t\'envia l\'enlla\u00e7 per WhatsApp per recuperar la llista sempre.</p>';
}

function shareWhatsApp() {
  var url = SS.getShareUrl();
  var s = getStats();
  var msg = '\ud83c\udf77 *La meva llista de vins - Que Rebenti la Baells 2026*\n\n'
    + s.bodegas.length + ' cellers visitats - ' + s.allW.length + ' vins anotats\n\n'
    + 'Consulta la meva llista completa aqui:\n' + url;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function exportXLSX() {
  var s=getStats(); if(!s.bodegas.length){showToast('Anota algun vi primer');return;}
  var rows=[['Celler','Vi','Notes','Valoraci\u00f3 (/5)','Data']], date=new Date().toLocaleDateString('ca-ES');
  s.bodegas.forEach(function(idx){wineData[idx].forEach(function(w){rows.push([BODEGAS[idx],w.name,w.notes||'',w.rating||'',date]);});});
  var wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:32},{wch:28},{wch:42},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'El meu rebost 2026');
  XLSX.writeFile(wb,'que_rebenti_la_baells_2026.xlsx');
  showToast('Excel descarregat \u2713');
}

function exportPDF() {
  var s=getStats(); if(!s.bodegas.length){showToast('Anota algun vi primer');return;}
  showToast('Generant PDF\u2026');
  var date=new Date().toLocaleDateString('ca-ES');
  var html='<h1>Que Rebenti La Baells</h1>'
    +'<div class="pdf-sub">Fira del Vi \u00b7 17 de maig 2026 \u00b7 Konvent de Cal Rosal</div>'
    +'<div class="pdf-date">'+s.bodegas.length+' cellers \u00b7 '+s.allW.length+' vins \u00b7 '+date+'</div>';
  s.bodegas.forEach(function(idx){
    var wines=wineData[idx],b=BODEGAS[idx];
    html+='<div class="pdf-bodega"><div class="pdf-bodega-name">'+b+'</div>';
    wines.forEach(function(w,j){
      var st=''; if(w.rating) for(var k=1;k<=5;k++) st+=(w.rating>=k?'\u2605':'\u2606');
      html+='<div class="pdf-wine"><span class="pdf-wine-num">'+(j+1)+'.</span>'
        +'<span class="pdf-wine-name">'+w.name+'</span>'+(w.rating?'<span class="pdf-wine-stars">'+st+'</span>':'')+'</div>';
      if(w.notes) html+='<div class="pdf-wine-notes">'+w.notes+'</div>';
    });
    html+='</div>';
  });
  html+='<div class="pdf-footer">Generat el '+date+' \u00b7 Que rebenti la Baells!</div>';
  var src=document.getElementById('pdf-source'); src.innerHTML=html;
  setTimeout(function(){
    html2canvas(src,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(function(canvas){
      var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      var iW=210-24,iH=(canvas.height*iW)/canvas.width,x=12,y=12,rem=iH,sy=0,pH=297-24;
      while(rem>0){
        var dH=Math.min(rem,pH),sH=(dH/iH)*canvas.height;
        var tmp=document.createElement('canvas'); tmp.width=canvas.width; tmp.height=sH;
        tmp.getContext('2d').drawImage(canvas,0,sy,canvas.width,sH,0,0,canvas.width,sH);
        pdf.addImage(tmp.toDataURL('image/png'),'PNG',x,y,iW,dH);
        rem-=dH; sy+=sH; if(rem>0) pdf.addPage();
      }
      src.innerHTML=''; pdf.save('que_rebenti_la_baells_2026.pdf'); showToast('PDF descarregat \u2713');
    });
  },100);
}

function updateBadge() {
  var t=0; for(var k in wineData) t+=wineData[k].length;
  var b=document.getElementById('listBadge');
  if(t>0){b.classList.add('vis');b.textContent=t;}else b.classList.remove('vis');
}
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
