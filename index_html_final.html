    html, body, #root { height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #111; }
    input, button { font-family: inherit; }

    /* APP SHELL */
    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; background: #fff; position: relative; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,0.5); }
    .scroll-area { flex: 1; overflow-y: auto; padding-bottom: calc(64px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }

    .tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .tab.active { color: #111; }
    .tab.inactive { color: #CCC; }

    /* SEARCH */
    .search-wrap { padding: 14px 16px 6px; }
    .search-box { display: flex; align-items: center; gap: 8px; background: #F7F7F7; border: 1px solid #EBEBEB; border-radius: 12px; padding: 10px 14px; }
    .search-box input { border: none; outline: none; flex: 1; font-size: 14px; background: transparent; color: #111; }

    /* SECTION LABEL */
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; padding: 16px 20px 8px; }

    .winery-card.has-wines { border-color: #00C896; background: #E8FAF5; }
    .winery-avatar { width: 44px; height: 44px; border-radius: 10px; background: #F0F0F0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #888; flex-shrink: 0; }

    .winery-sub { font-size: 12px; color: #888; }
    .winery-card.has-wines .winery-sub { color: #00C896; font-weight: 600; }

    /* DETAIL */
    .detail-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #EBEBEB; background: #fff; flex-shrink: 0; }
    .back-btn { background: #F7F7F7; border: none; cursor: pointer; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #111; flex-shrink: 0; }
    .detail-avatar { width: 36px; height: 36px; border-radius: 8px; background: #111; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; flex-shrink: 0; }

    .add-row { display: flex; gap: 8px; padding: 14px 14px 6px; }
    .add-input { flex: 1; border: 1.5px solid #EBEBEB; border-radius: 12px; padding: 12px 14px; font-size: 14px; outline: none; color: #111; }
    .add-input:focus { border-color: #111; }
    .add-input::placeholder { color: #BBB; }
    .add-btn { background: #111; color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* WINE ITEMS */
    .wine-list { padding: 0 12px; }

    /* MY LIST */

    /* EXPORT */

    /* PROFILE */
    .profile-wrap { padding: 0 12px; }
    .profile-card { background: #fff; border: 1px solid #EBEBEB; border-radius: 14px; padding: 24px 20px; text-align: center; margin-bottom: 10px; }
    .profile-avatar-lg { width: 72px; height: 72px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 28px; margin: 0 auto 12px; overflow: hidden; }
    .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 3px; }
    .profile-email { font-size: 13px; color: #888; margin-bottom: 20px; }
    .stats-row { display: flex; margin-bottom: 20px; }
    .stat-box { flex: 1; text-align: center; padding: 0 12px; }
    .stat-box + .stat-box { border-left: 1px solid #EBEBEB; }
    .stat-num { font-size: 22px; font-weight: 800; color: #111; line-height: 1; margin-bottom: 4px; }
    .stat-num.amber { color: #F5A623; }
    .stat-label { font-size: 11px; color: #888; font-weight: 500; }
    .logout-btn { width: 100%; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; background: none; border: 1.5px solid #E53935; color: #E53935; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .logout-btn .material-icons-round { font-size: 18px; }
    .fair-badge { background: #F7F7F7; border: 1px solid #EBEBEB; border-radius: 12px; padding: 13px 16px; text-align: center; margin-top: 8px; }
    .fair-badge-text { font-size: 12px; color: #888; line-height: 1.6; }
    .fair-badge-text strong { color: #111; display: block; font-size: 13px; margin-bottom: 2px; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 56px 24px; }
    .empty .material-icons-round { font-size: 44px; color: #DDD; margin-bottom: 12px; }
    .empty-text { font-size: 14px; color: #888; line-height: 1.6; max-width: 240px; margin: 0 auto; }

    /* OVERLAY & SHEET */
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; display: flex; align-items: flex-end; }
    .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px calc(28px + env(safe-area-inset-bottom)); width: 100%; max-height: 92dvh; overflow-y: auto; }
    .sheet-title { font-size: 16px; font-weight: 800; color: #111; margin-bottom: 6px; }
    .sheet-text { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.5; }
    .sheet-btns { display: flex; gap: 10px; }
    .sheet-cancel { flex: 1; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; background: #F7F7F7; border: none; color: #111; }
    .sheet-confirm { flex: 1; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; color: #fff; }

    /* TOAST */
    .toast { position: absolute; bottom: calc(72px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 50; white-space: nowrap; }

    /* LOGIN */
    .login-screen { display: flex; flex-direction: column; justify-content: space-between; height: 100dvh; background: #111; overflow-y: auto; }
    .login-top { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: clamp(32px, 8vw, 64px) clamp(28px, 8vw, 56px); }
    .login-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: clamp(24px, 6vw, 40px); }
    .login-headline { font-size: clamp(36px, 10vw, 68px); font-weight: 900; color: #fff; line-height: 1.05; letter-spacing: -2px; margin-bottom: clamp(20px, 5vw, 32px); }
    .login-headline span { display: block; }
    .login-sub { font-size: clamp(14px, 3.5vw, 17px); font-weight: 700; color: #555; letter-spacing: -0.3px; }
    .login-bottom { padding: clamp(24px, 6vw, 40px) clamp(28px, 8vw, 56px); border-top: 1px solid #222; }
    .google-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; background: #fff; color: #111; border: none; border-radius: 14px; padding: 16px 20px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .google-btn-left { display: flex; align-items: center; gap: 12px; }
    .google-g { width: 24px; height: 24px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 900; flex-shrink: 0; }

    /* LOADING */
    .loading { display: flex; align-items: center; justify-content: center; height: 100dvh; flex-direction: column; gap: 12px; color: #555; font-size: 14px; background: #111; }
    .loading .material-icons-round { font-size: 40px; color: #333; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

const sb = supabase.createClient(
  "https://xuykrlesxorcwsjfmtun.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtybGVzeG9yY3dzamZtdHVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MzcwODksImV4cCI6MjA5MzQxMzA4OX0.u4NwPoXmIQarWdh2Wv2nzEkXkhyx4EQkxQeYDlr9RAk"
);

const WINERIES = [
  "Amor per la Terra","Bàrbara Forés","Bodegas La Senda","Cal Xurriu",
  "Carles Llarch – Vital","Clos du Rouge Gorge","Còsmic Vinyaters","Cotzé",
  "Le Débit d'Ivresse","Domaine Du Possible","El Abuelo Wine","Eloi Cedó",
  "En Movimiento","Esencia Rural","Finca La Despeinada","Julia Casado",
  "LAFLECAVINS // laflecavins","La Nave de los Locos","La Tribu del Millonari",
  "Mas de les Monges","Masia Can Sení","Melsolo","Mendall",
  "La Calandria. Pura Garnacha","Niu Celler","Nuria Renom","ORDAvins",
  "Oriol Artigas","Raíces Aereas","Rim","Roger Viu",
  "Sà Vinyataire","Serps Sidra","Tanca Els Ulls","Terrabuxena",
  "Vinos Indar","Vinyas d'Empremta","Vinyes d'Estraperlo","Vinyes Tortuga",
  "La Zafra"
];

const STAR = "#F5A623";
const DANGER = "#E53935";
const rankColor = i => i===0?STAR:i===1?"#A8A8A8":i===2?"#C47A3A":"#111";

function Icon({ name, size=22, style={} }) {
  return <span className="material-icons-round" style={{ fontSize:size, ...style }}>{name}</span>;
}

function Stars({ rating, onRate, size=22, readOnly=false }) {
  const [hover, setHover] = useState(0);
  return (
    <div className="stars">
      {[1,2,3,4,5].map(n => (
        <span key={n} className="star"
          style={{ fontSize:size, color: n<=(hover||rating)?STAR:"#E0E0E0", cursor:readOnly?"default":"pointer" }}
          onClick={() => !readOnly && onRate(n===rating?0:n)}
          onMouseEnter={() => !readOnly && setHover(n)}
          onMouseLeave={() => !readOnly && setHover(0)}
        >★</span>
      ))}
    </div>
  );
}

function WineryDetail({ winery, wines, onBack, onAdd, onDelete, onRate }) {
  const [input, setInput] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [ratingSheet, setRatingSheet] = useState(null);
  const [pendingRating, setPendingRating] = useState(0);
  const myWines = wines[winery] || [];
  const labels = ["Sense valorar","Acceptable","Correcte","Bo","Molt bo","Excepcional"];

  const handleAdd = () => {
    const v = input.trim();
    if (v) { setRatingSheet(v); setPendingRating(0); setInput(""); }
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div className="detail-header">
        <button className="back-btn" onClick={onBack}><Icon name="arrow_back"/></button>
        <div className="detail-avatar">{winery[0]}</div>
        <div className="detail-name">{winery}</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", paddingBottom:16 }}>
        <div className="add-row">
          <input className="add-input" placeholder="Nom del vi…" value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key==="Enter" && handleAdd()}/>
          <button className="add-btn" onClick={handleAdd}>+ Afegir</button>
        </div>
        {myWines.length===0 ? (
          <div className="empty">
            <Icon name="wine_bar" size={44}/>
            <div className="empty-text">Afegeix el primer vi que t'hagi agradat d'aquest celler</div>
          </div>
        ) : (
          <>
            <div className="section-label">Vins anotats ({myWines.length})</div>
            <div className="wine-list">
              {myWines.map(w => (
                <div key={w.id} className="wine-item">
                  <div className="wine-item-top">
                    <span className="wine-name">{w.name}</span>
                    <button className="delete-btn" onClick={() => setConfirmDelete(w)}>
                      <Icon name="close" size={18}/>
                    </button>
                  </div>
                  <Stars rating={w.rating} onRate={r => onRate(winery, w.id, r)}/>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {ratingSheet && (
        <div className="overlay" onClick={() => setRatingSheet(null)}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-title">Quina nota li posaries?</div>
            <div style={{ fontSize:14, color:"#888", marginBottom:16, lineHeight:1.5 }}>
              <span style={{ fontWeight:700, color:"#111" }}>"{ratingSheet}"</span>
              <span style={{ display:"block", marginTop:2 }}>Pots canviar-la després si vols.</span>
            </div>
            <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:16 }}>
              {[1,2,3,4,5].map(n => (
                <span key={n} onClick={() => setPendingRating(n===pendingRating?0:n)}
                  style={{ fontSize:38, cursor:"pointer", color:n<=pendingRating?STAR:"#E0E0E0", display:"inline-block", transform:n<=pendingRating?"scale(1.15)":"scale(1)" }}>★</span>
              ))}
            </div>
            <div style={{ textAlign:"center", fontSize:13, color:"#888", marginBottom:20 }}>{labels[pendingRating]}</div>
            <div className="sheet-btns">
              <button className="sheet-cancel" onClick={() => setRatingSheet(null)}>Cancel·lar</button>
              <button className="sheet-confirm" style={{ background:"#111" }}
                onClick={() => { onAdd(winery, ratingSheet, pendingRating); setRatingSheet(null); }}>
                {pendingRating===0?"Afegir sense nota":"Afegir vi"}
              </button>
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div className="overlay" onClick={() => setConfirmDelete(null)}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-title">Eliminar vi</div>
            <div className="sheet-text">Segur que vols eliminar "{confirmDelete.name}"?</div>
            <div className="sheet-btns">
              <button className="sheet-cancel" onClick={() => setConfirmDelete(null)}>Cancel·lar</button>
              <button className="sheet-confirm" style={{ background:DANGER }}
                onClick={() => { onDelete(winery, confirmDelete.id); setConfirmDelete(null); }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("bodegas");
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [wines, setWines] = useState({});
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, sess) => setSession(sess));
    return () => subscription.unsubscribe();
  }, []);

  const loadWines = useCallback(async () => {
    const { data } = await sb.from("wines").select("*").order("created_at");
    if (!data) return;
    const grouped = {};
    data.forEach(w => {
      if (!grouped[w.winery]) grouped[w.winery] = [];
      grouped[w.winery].push({ id:w.id, name:w.name, rating:w.rating });
    });
    setWines(grouped);
  }, []);

  useEffect(() => { if (session) loadWines(); else setWines({}); }, [session, loadWines]);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const loginGoogle = () => sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin }
  });

  const logout = async () => { await sb.auth.signOut(); setWines({}); };

  const addWine = async (winery, name, rating=0) => {
    const { data } = await sb.from("wines").insert({ winery, name, rating, user_id:session.user.id }).select().single();
    if (!data) return;
    setWines(p => ({ ...p, [winery]:[...(p[winery]||[]), { id:data.id, name, rating }] }));
    showToast(rating>0?`Afegit amb ${"★".repeat(rating)}`:"Vi afegit ✓");
  };

  const deleteWine = async (winery, id) => {
    await sb.from("wines").delete().eq("id", id);
    setWines(p => ({ ...p, [winery]:p[winery].filter(w => w.id!==id) }));
    showToast("Vi eliminat");
  };

  const rateWine = async (winery, id, rating) => {
    await sb.from("wines").update({ rating }).eq("id", id);
    setWines(p => ({ ...p, [winery]:p[winery].map(w => w.id===id?{...w,rating}:w) }));
  };

  const allWines = useMemo(() => {
    const r = [];
    Object.entries(wines).forEach(([winery, ws]) => ws.forEach(w => r.push({...w, winery})));
    return r.sort((a,b) => b.rating!==a.rating?b.rating-a.rating:a.name.localeCompare(b.name));
  }, [wines]);

  const filteredWineries = useMemo(() =>
    WINERIES.filter(w =>
      w.toLowerCase().includes(search.toLowerCase()) &&
      (filter==="all"||(wines[w]&&wines[w].length>0))
    ), [search, filter, wines]);

  const wineriesWithWines = Object.keys(wines).filter(k => wines[k].length>0).length;
  const ratedWines = allWines.filter(w => w.rating>0);
  const avgRating = ratedWines.length>0
    ? (ratedWines.reduce((s,w)=>s+w.rating,0)/ratedWines.length).toFixed(1) : "–";

  const exportPDF = () => {
    const rows = allWines.map((w,i) =>
      `<tr style="background:${i%2===0?"#fff":"#F7F7F7"}">
        <td style="padding:10px 14px;font-weight:700">${i+1}</td>
        <td style="padding:10px 14px">${w.name}</td>
        <td style="padding:10px 14px;color:#888">${w.winery}</td>
        <td style="padding:10px 14px;color:#F5A623">${w.rating?"★".repeat(w.rating):"–"}</td>
      </tr>`).join("");
    const win = window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>El meu rebost 2026–2027</title>
    <style>body{font-family:-apple-system,sans-serif;padding:40px;color:#111;max-width:720px;margin:0 auto}h1{font-size:26px;font-weight:900;margin-bottom:4px}h2{font-size:15px;color:#888;margin-bottom:32px}em{color:#00C896}table{width:100%;border-collapse:collapse;font-size:14px}th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;color:#888;border-bottom:2px solid #111}.footer{margin-top:32px;font-size:12px;color:#bbb;text-align:center}</style>
    </head><body><h1>No t'oblidis dels vins de la fira.</h1>
    <h2>El teu <em>rebost 2026–2027</em> · Que Rebenti La Baells · 17 de maig de 2026</h2>
    <table><thead><tr><th>#</th><th>Vi</th><th>Celler</th><th>Nota</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="footer">Generat el ${new Date().toLocaleDateString("ca-ES")}</div></body></html>`);
    win.document.close();
    setTimeout(()=>{win.focus();win.print();},400);
  };

  const copyList = () => {
    const text = allWines.map((w,i)=>`${i+1}. ${w.name} (${w.winery}) – ${"★".repeat(w.rating)||"Sense valorar"}`).join("\n");
    navigator.clipboard.writeText(text).then(()=>showToast("Copiat al porta-retalls ✓"));
  };

  const shareWhatsapp = () => {
    const h = `🍷 *El meu rebost 2026–2027*\n_Que Rebenti La Baells · 17 de maig de 2026_\n\n`;
    const b = allWines.map((w,i)=>`${i+1}. *${w.name}* · ${w.winery}${w.rating?" · "+"★".repeat(w.rating):""}`).join("\n");
    window.open(`https://wa.me/?text=${encodeURIComponent(h+b+`\n\n_${allWines.length} vins anotats_`)}`, "_blank");
  };

  if (loading) return (
    <div className="app">
      <div className="loading"><Icon name="wine_bar" size={40}/> Carregant…</div>
    </div>
  );

  if (!session) {
    const doLogin = function() {
      sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin }
      });
    };
    return (
      <div className="app">
        <div className="login-screen">
          <div className="login-top">
            <div className="login-eyebrow">Que Rebenti La Baells · 17 de maig 2026</div>
            <div className="login-headline">
              <span>No t&apos;oblidis</span>
              <span>dels vins que</span>
              <span>t&apos;han agradat.</span>
            </div>
            <div className="login-sub">Construeix el teu rebost 2026&ndash;2027</div>
          </div>
          <div className="login-bottom">
            <button className="google-btn" onClick={doLogin}>
              <div className="google-btn-left">
                <span className="google-g">G</span>
                <span>Continua amb Google</span>
              </div>
              <span style={{ opacity:0.4, fontSize:20 }}>→</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  const user = session.user;
  const userName = user?.user_metadata?.full_name || user?.email || "";
  const userAvatar = user?.user_metadata?.avatar_url;
  const userInitial = userName ? userName[0].toUpperCase() : "?";

  const tabs = [
    { id:"bodegas",  icon:"storefront",   label:"Cellers" },
    { id:"lista",    icon:"format_list_numbered", label:"La meva llista" },
    { id:"exportar", icon:"ios_share",    label:"Exportar" },
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <div className="eyebrow">Fira del Vi · 17 de maig 2026</div>
          <div className="title">Que Rebenti <em>La Baells</em></div>
        </div>
        <button className="avatar-btn" onClick={() => { setTab("perfil"); setSelected(null); }}>
          {userAvatar ? <img src={userAvatar} alt={userName}/> : userInitial}
        </button>
      </div>

      <div className="scroll-area">

        {tab==="bodegas" && !selected && (
          <>
            <div className="search-wrap">
              <div className="search-box">
                <Icon name="search" size={18}/>
                <input placeholder="Cerca celler…" value={search} onChange={e=>setSearch(e.target.value)}/>
                {search && <button style={{ background:"none", border:"none", cursor:"pointer", display:"flex" }} onClick={()=>setSearch("")}><Icon name="close" size={16}/></button>}
              </div>
            </div>
            <div className="filter-row">
              {[["all","Tots"],["wines","Amb vins"]].map(([val,label])=>(
                <button key={val} className={`filter-btn${filter===val?" active":""}`} onClick={()=>setFilter(val)}>{label}</button>
              ))}
              <span className="count-label">{filteredWineries.length} cellers</span>
            </div>
            {filteredWineries.length===0 ? (
              <div className="empty"><Icon name="search_off" size={44}/><div className="empty-text">No s'han trobat cellers</div></div>
            ) : (
              <div className="winery-list">
                {filteredWineries.map(w => {
                  const count = (wines[w]||[]).length;
                  const active = count>0;
                  return (
                    <div key={w} className={`winery-card${active?" has-wines":""}`} onClick={()=>setSelected(w)}>
                      <div className="winery-avatar">{w[0]}</div>
                      <div className="winery-info">
                        <div className="winery-name">{w}</div>
                        <div className="winery-sub">{active?`${count} vi${count>1?"s":""} anotat${count>1?"s":""}` : "Toca per anotar vins"}</div>
                      </div>
                      <Icon name="chevron_right" size={20} style={{ color:"#DDD" }}/>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}

        {tab==="bodegas" && selected && (
          <WineryDetail winery={selected} wines={wines} onBack={()=>setSelected(null)}
            onAdd={addWine} onDelete={deleteWine} onRate={rateWine}/>
        )}

        {tab==="lista" && (
          <>
            <div className="section-label">Ordenats per valoració</div>
            {allWines.length===0 ? (
              <div className="empty"><Icon name="wine_bar" size={44}/><div className="empty-text">Encara no has anotat cap vi. Comença explorant els cellers!</div></div>
            ) : (
              <div className="list-wrap">
                {allWines.map((w,i)=>(
                  <div key={w.id} className="list-item">
                    <div className="list-rank" style={{ background:rankColor(i) }}>{i+1}</div>
                    <div className="list-info">
                      <div className="list-wine">{w.name}</div>
                      <div className="list-winery">{w.winery}</div>
                    </div>
                    <Stars rating={w.rating} readOnly size={14}/>
                  </div>
                ))}
              </div>
            )}
          </>
        )}

        {tab==="exportar" && (
          <>
            <div className="section-label">Exporta la meva llista</div>
            <div className="export-wrap">
              <div className="export-card">
                <div className="export-stat">
                  Tens <strong>{allWines.length} vins</strong> anotats de <strong>{wineriesWithWines} cellers</strong>.
                </div>
                <button className="export-btn primary" onClick={exportPDF}><Icon name="picture_as_pdf" size={18}/>Descarrega PDF</button>
                <button className="export-btn secondary" onClick={shareWhatsapp}><Icon name="chat" size={18}/>Comparteix per WhatsApp</button>
                <button className="export-btn secondary" onClick={copyList}><Icon name="content_copy" size={18}/>Copia al porta-retalls</button>
                {allWines.length>0 && (
                  <>
                    <div className="section-label" style={{ padding:"12px 0 8px" }}>Previsualització</div>
                    <div className="preview-box">
                      {allWines.map((w,i)=>(
                        <div key={w.id} className="preview-row">
                          <div><div className="preview-wine">{i+1}. {w.name}</div><div className="preview-winery">{w.winery}</div></div>
                          <div className="preview-stars">{w.rating?"★".repeat(w.rating):"–"}</div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          </>
        )}

        {tab==="perfil" && (
          <>
            <div className="section-label">El meu perfil</div>
            <div className="profile-wrap">
              <div className="profile-card">
                <div className="profile-avatar-lg">{userAvatar?<img src={userAvatar} alt={userName}/>:userInitial}</div>
                <div className="profile-name">{userName}</div>
                <div className="profile-email">{user.email}</div>
                <div className="stats-row">
                  <div className="stat-box"><div className="stat-num">{allWines.length}</div><div className="stat-label">Vins</div></div>
                  <div className="stat-box"><div className="stat-num">{wineriesWithWines}</div><div className="stat-label">Cellers</div></div>
                  <div className="stat-box"><div className="stat-num amber">{avgRating}</div><div className="stat-label">Mitjana ★</div></div>
                </div>
                <button className="logout-btn" onClick={logout}><Icon name="logout" size={18}/>Tanca la sessió</button>
              </div>
              <div className="fair-badge">
                <div className="fair-badge-text">
                  <strong>Que Rebenti La Baells</strong>
                  Fira del Vi · 17 de maig de 2026<br/>40 cellers participants
                </div>
              </div>
            </div>
          </>
        )}
      </div>

      <div className="tab-bar">
        {tabs.map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?"active":"inactive"}`}
            onClick={()=>{ setTab(t.id); if(t.id!=="bodegas") setSelected(null); }}>
            <Icon name={t.icon} size={22}/>
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
