  wine:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 22h8M12 11v11M7 2h10l-1.5 9a3.5 3.5 0 0 1-7 0L7 2z"/></svg>,
  store:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  list:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  share:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
  pdf:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  copy:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  chat:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  logout:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  arrow:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
};

function Stars({ rating, onRate, size=22, readOnly=false }) {
  const [hover, setHover] = React.useState(0);
  return (
    <div className="stars">
      {[1,2,3,4,5].map(n => (
        <span key={n} className="star"
          style={{ fontSize:size, color:n<=(hover||rating)?STAR:"#E0E0E0", cursor:readOnly?"default":"pointer" }}
          onClick={function(){ if(!readOnly) onRate(n===rating?0:n); }}
          onMouseEnter={function(){ if(!readOnly) setHover(n); }}
          onMouseLeave={function(){ if(!readOnly) setHover(0); }}>★</span>
      ))}
    </div>
  );
}

function WineryDetail({ winery, wines, onBack, onAdd, onDelete, onRate }) {
  const [input, setInput] = React.useState("");
  const [delSheet, setDelSheet] = React.useState(null);
  const [ratingSheet, setRatingSheet] = React.useState(null);
  const [pending, setPending] = React.useState(0);
  const myWines = wines[winery] || [];
  const labels = ["Sense valorar","Acceptable","Correcte","Bo","Molt bo","Excepcional"];

  function handleAdd() {
    const v = input.trim();
    if (v) { setRatingSheet(v); setPending(0); setInput(""); }
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div className="dhdr">
        <button className="bbtn" onClick={onBack}>{IC.back}</button>
        <div className="dav">{winery[0]}</div>
        <div className="dname">{winery}</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", paddingBottom:16 }}>
        <div className="addrow">
          <input className="addinput" placeholder="Nom del vi..." value={input}
            onChange={function(e){ setInput(e.target.value); }}
            onKeyDown={function(e){ if(e.key==="Enter") handleAdd(); }}/>
          <button className="addbtn" onClick={handleAdd}>+ Afegir</button>
        </div>
        {myWines.length===0 ? (
          <div className="empty">{IC.wine}<div className="etxt">Afegeix el primer vi que t&apos;hagi agradat d&apos;aquest celler</div></div>
        ) : (
          <div>
            <div className="slbl">Vins anotats ({myWines.length})</div>
            <div className="vwrap">
              {myWines.map(function(w){ return (
                <div key={w.id} className="vitem">
                  <div className="vitop">
                    <span className="vname">{w.name}</span>
                    <button className="delbtn" onClick={function(){ setDelSheet(w); }}>{IC.close}</button>
                  </div>
                  <Stars rating={w.rating} onRate={function(r){ onRate(winery, w.id, r); }}/>
                </div>
              ); })}
            </div>
          </div>
        )}
      </div>

      {ratingSheet && (
        <div className="ov" onClick={function(){ setRatingSheet(null); }}>
          <div className="sheet" onClick={function(e){ e.stopPropagation(); }}>
            <div className="stitle">Quina nota li posaries?</div>
            <div style={{ fontSize:14, color:"#888", marginBottom:16, lineHeight:1.5 }}>
              <span style={{ fontWeight:700, color:"#111" }}>&ldquo;{ratingSheet}&rdquo;</span>
              <span style={{ display:"block", marginTop:2 }}>Pots canviar-la despres si vols.</span>
            </div>
            <div style={{ display:"flex", justifyContent:"center", gap:10, marginBottom:16 }}>
              {[1,2,3,4,5].map(function(n){ return (
                <span key={n} onClick={function(){ setPending(n===pending?0:n); }}
                  style={{ fontSize:36, cursor:"pointer", color:n<=pending?STAR:"#E0E0E0", display:"inline-block", transform:n<=pending?"scale(1.15)":"scale(1)" }}>&#9733;</span>
              ); })}
            </div>
            <div style={{ textAlign:"center", fontSize:13, color:"#888", marginBottom:20 }}>{labels[pending]}</div>
            <div className="sbtns">
              <button className="scancel" onClick={function(){ setRatingSheet(null); }}>Cancel&middot;lar</button>
              <button className="sconfirm" style={{ background:"#111" }}
                onClick={function(){ onAdd(winery, ratingSheet, pending); setRatingSheet(null); }}>
                {pending===0?"Afegir sense nota":"Afegir vi"}
              </button>
            </div>
          </div>
        </div>
      )}

      {delSheet && (
        <div className="ov" onClick={function(){ setDelSheet(null); }}>
          <div className="sheet" onClick={function(e){ e.stopPropagation(); }}>
            <div className="stitle">Eliminar vi</div>
            <div className="stxt">Segur que vols eliminar &ldquo;{delSheet.name}&rdquo;?</div>
            <div className="sbtns">
              <button className="scancel" onClick={function(){ setDelSheet(null); }}>Cancel&middot;lar</button>
              <button className="sconfirm" style={{ background:DANGER }}
                onClick={function(){ onDelete(winery, delSheet.id); setDelSheet(null); }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState("bodegas");
  const [search, setSearch] = React.useState("");
  const [filter, setFilter] = React.useState("all");
  const [wines, setWines] = React.useState({});
  const [selected, setSelected] = React.useState(null);
  const [toast, setToast] = React.useState(null);

  React.useEffect(function() {
    sb.auth.getSession().then(function(res) {
      setSession(res.data.session);
      setLoading(false);
    });
    var sub = sb.auth.onAuthStateChange(function(_e, sess) { setSession(sess); });
    return function() { sub.data.subscription.unsubscribe(); };
  }, []);

  function loadWines() {
    sb.from("wines").select("*").order("created_at").then(function(res) {
      if (!res.data) return;
      var grouped = {};
      res.data.forEach(function(w) {
        if (!grouped[w.winery]) grouped[w.winery] = [];
        grouped[w.winery].push({ id:w.id, name:w.name, rating:w.rating });
      });
      setWines(grouped);
    });
  }

  React.useEffect(function() {
    if (session) loadWines(); else setWines({});
  }, [session]);

  function showToast(msg) { setToast(msg); setTimeout(function(){ setToast(null); }, 2200); }

  function loginGoogle() {
    sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.origin } });
  }

  function logout() { sb.auth.signOut().then(function(){ setWines({}); }); }

  function addWine(winery, name, rating) {
    if (rating === undefined) rating = 0;
    sb.from("wines").insert({ winery:winery, name:name, rating:rating, user_id:session.user.id }).select().single().then(function(res) {
      if (!res.data) return;
      setWines(function(p) {
        var arr = p[winery] ? p[winery].slice() : [];
        arr.push({ id:res.data.id, name:name, rating:rating });
        var next = Object.assign({}, p); next[winery] = arr; return next;
      });
      showToast(rating>0?"Afegit amb " + "★".repeat(rating):"Vi afegit ✓");
    });
  }

  function deleteWine(winery, id) {
    sb.from("wines").delete().eq("id", id).then(function() {
      setWines(function(p) {
        var next = Object.assign({}, p);
        next[winery] = p[winery].filter(function(w){ return w.id!==id; });
        return next;
      });
      showToast("Vi eliminat");
    });
  }

  function rateWine(winery, id, rating) {
    sb.from("wines").update({ rating:rating }).eq("id", id);
    setWines(function(p) {
      var next = Object.assign({}, p);
      next[winery] = p[winery].map(function(w){ return w.id===id ? Object.assign({},w,{rating:rating}) : w; });
      return next;
    });
  }

  var allWines = React.useMemo(function() {
    var r = [];
    Object.entries(wines).forEach(function(entry) {
      entry[1].forEach(function(w){ r.push(Object.assign({}, w, { winery:entry[0] })); });
    });
    return r.sort(function(a,b){ return b.rating!==a.rating ? b.rating-a.rating : a.name.localeCompare(b.name); });
  }, [wines]);

  var filteredWineries = React.useMemo(function() {
    return WINERIES.filter(function(w) {
      return w.toLowerCase().includes(search.toLowerCase()) &&
        (filter==="all" || (wines[w] && wines[w].length>0));
    });
  }, [search, filter, wines]);

  var wineriesWithWines = Object.keys(wines).filter(function(k){ return wines[k].length>0; }).length;
  var ratedWines = allWines.filter(function(w){ return w.rating>0; });
  var avgRating = ratedWines.length>0 ? (ratedWines.reduce(function(s,w){ return s+w.rating; },0)/ratedWines.length).toFixed(1) : "–";

  function exportPDF() {
    var rows = allWines.map(function(w,i) {
      return "<tr style='background:" + (i%2===0?"#fff":"#F7F7F7") + "'><td style='padding:10px 14px;font-weight:700'>" + (i+1) + "</td><td style='padding:10px 14px'>" + w.name + "</td><td style='padding:10px 14px;color:#888'>" + w.winery + "</td><td style='padding:10px 14px;color:#F5A623'>" + (w.rating?"★".repeat(w.rating):"–") + "</td></tr>";
    }).join("");
    var win = window.open("","_blank");
    win.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><title>El meu rebost 26-27</title><style>body{font-family:-apple-system,sans-serif;padding:40px;color:#111;max-width:720px;margin:0 auto}h1{font-size:26px;font-weight:900;margin-bottom:4px}h2{font-size:15px;color:#888;margin-bottom:32px}em{color:#00C896}table{width:100%;border-collapse:collapse;font-size:14px}th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;color:#888;border-bottom:2px solid #111}.footer{margin-top:32px;font-size:12px;color:#bbb;text-align:center}</style></head><body><h1>El meu rebost 26-27</h1><h2><em>Que Rebenti La Baells</em> · 17 de maig de 2026</h2><table><thead><tr><th>#</th><th>Vi</th><th>Celler</th><th>Nota</th></tr></thead><tbody>" + rows + "</tbody></table><div class='footer'>Generat el " + new Date().toLocaleDateString("ca-ES") + "</div></body></html>");
    win.document.close();
    setTimeout(function(){ win.focus(); win.print(); }, 400);
  }

  function copyList() {
    var text = allWines.map(function(w,i){ return (i+1) + ". " + w.name + " (" + w.winery + ") - " + ("★".repeat(w.rating)||"Sense valorar"); }).join("\n");
    navigator.clipboard.writeText(text).then(function(){ showToast("Copiat al porta-retalls ✓"); });
  }

  function shareWhatsapp() {
    var h = "🍷 *El meu rebost 26-27*\n_Que Rebenti La Baells · 17 de maig de 2026_\n\n";
    var b = allWines.map(function(w,i){ return (i+1) + ". *" + w.name + "* · " + w.winery + (w.rating ? " · " + "★".repeat(w.rating) : ""); }).join("\n");
    window.open("https://wa.me/?text=" + encodeURIComponent(h+b+"\n\n_" + allWines.length + " vins anotats_"), "_blank");
  }

  if (loading) return (
    <div className="loading">{IC.wine}<span>Carregant...</span></div>
  );

  if (!session) return (
    <div className="login-bg">
      <div className="login-card">
        <div className="ltop">
          <div className="leye">Que Rebenti La Baells &middot; 17 de maig 2026</div>
          <div className="lhead">No t&apos;oblidis dels vins que t&apos;han agradat.</div>
          <div className="lsub">Construeix el teu rebost 2026&ndash;2027</div>
        </div>
        <div className="lbot">
          <button className="gbtn" onClick={loginGoogle}>
            <div className="gbtnl">
              <span className="gg">G</span>
              <span>Continua amb Google</span>
            </div>
            <span className="garrow">{IC.arrow}</span>
          </button>
        </div>
      </div>
    </div>
  );

  var user = session.user;
  var userName = (user.user_metadata && user.user_metadata.full_name) || user.email || "";
  var userAvatar = user.user_metadata && user.user_metadata.avatar_url;
  var userInitial = userName ? userName[0].toUpperCase() : "?";

  var tabs = [
    { id:"bodegas", icon:IC.store,  label:"Cellers" },
    { id:"lista",   icon:IC.list,   label:"La meva llista" },
    { id:"exportar",icon:IC.share,  label:"Exportar" },
  ];

  var pageTitles = {
    bodegas:  { h1:"Cellers", sub:WINERIES.length + " participants" },
    lista:    { h1:"La meva llista", sub:"Ordenats per valoracio" },
    exportar: { h1:"Exportar", sub:"Descarrega o comparteix" },
    perfil:   { h1:"El meu perfil", sub:userName },
  };

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sb-brand">
          <div className="sb-eye">Que Rebenti La Baells</div>
          <div className="sb-ttl">El meu rebost <em>26–27</em></div>
        </div>
        <nav className="sb-nav">
          {tabs.map(function(t){ return (
            <button key={t.id} className={"sn-btn" + (tab===t.id&&!selected?" on":"")}
              onClick={function(){ setTab(t.id); setSelected(null); }}>
              {t.icon}{t.label}
            </button>
          ); })}
        </nav>
        <div className="sb-user">
          <div className="sb-av" onClick={function(){ setTab("perfil"); setSelected(null); }}>
            {userAvatar ? <img src={userAvatar} alt={userName}/> : userInitial}
          </div>
          <div className="sb-uinfo">
            <div className="sb-uname">{userName}</div>
            <div className="sb-uemail">{user.email}</div>
          </div>
          <button className="sb-logout" onClick={logout} title="Tanca la sessio">{IC.logout}</button>
        </div>
      </aside>

      <div className="main">
        <div className="hdr">
          <div>
            <div className="hdr-eye">Que Rebenti La Baells</div>
            <div className="hdr-ttl">El meu rebost <em>26–27</em></div>
          </div>
          <button className="hdr-av" onClick={function(){ setTab("perfil"); setSelected(null); }}>
            {userAvatar ? <img src={userAvatar} alt={userName}/> : userInitial}
          </button>
        </div>

        {!selected && pageTitles[tab] && (
          <div className="page-hdr">
            <div>
              <h1>{pageTitles[tab].h1}</h1>
              <div className="page-sub">{pageTitles[tab].sub}</div>
            </div>
          </div>
        )}

        <div className="scroll">

          {tab==="bodegas" && !selected && (
            <div>
              <div className="srch-wrap">
                <div className="srch-box">
                  <span style={{ color:"#CCC" }}>{IC.search}</span>
                  <input placeholder="Cerca celler..." value={search} onChange={function(e){ setSearch(e.target.value); }}/>
                  {search && <button className="srch-clear" onClick={function(){ setSearch(""); }}>{IC.close}</button>}
                </div>
              </div>
              <div className="frow">
                {[["all","Tots"],["wines","Amb vins"]].map(function(item){ return (
                  <button key={item[0]} className={"fbtn"+(filter===item[0]?" on":"")} onClick={function(){ setFilter(item[0]); }}>{item[1]}</button>
                ); })}
                <span className="cnt">{filteredWineries.length} cellers</span>
              </div>
              {filteredWineries.length===0 ? (
                <div className="empty">{IC.search}<div className="etxt">No s&apos;han trobat cellers</div></div>
              ) : (
                <div className="wgrid">
                  {filteredWineries.map(function(w) {
                    var count = (wines[w]||[]).length; var active = count>0;
                    return (
                      <div key={w} className={"wcard"+(active?" act":"")} onClick={function(){ setSelected(w); }}>
                        <div className="wav">{w[0]}</div>
                        <div className="winfo">
                          <div className="wname">{w}</div>
                          <div className="wsub">{active ? count+" vi"+(count>1?"s":"")+" anotat"+(count>1?"s":"") : "Toca per anotar vins"}</div>
                        </div>
                        <span className="wchev">{IC.chevron}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab==="bodegas" && selected && (
            <WineryDetail winery={selected} wines={wines} onBack={function(){ setSelected(null); }}
              onAdd={addWine} onDelete={deleteWine} onRate={rateWine}/>
          )}

          {tab==="lista" && (
            <div>
              {allWines.length===0 ? (
                <div className="empty">{IC.wine}<div className="etxt">Encara no has anotat cap vi. Comenca explorant els cellers!</div></div>
              ) : (
                <div className="llwrap" style={{ marginTop:8 }}>
                  {allWines.map(function(w,i){ return (
                    <div key={w.id} className="litem">
                      <div className="lrank" style={{ background:rankColor(i) }}>{i+1}</div>
                      <div className="linfo">
                        <div className="lwine">{w.name}</div>
                        <div className="lwinery">{w.winery}</div>
                      </div>
                      <Stars rating={w.rating} readOnly={true} size={13}/>
                    </div>
                  ); })}
                </div>
              )}
            </div>
          )}

          {tab==="exportar" && (
            <div className="ewrap" style={{ marginTop:16 }}>
              <div className="ecard">
                <div className="estat">Tens <strong>{allWines.length} vins</strong> anotats de <strong>{wineriesWithWines} cellers</strong>.</div>
                <button className="ebtn pr" onClick={exportPDF}>{IC.pdf} Descarrega PDF</button>
                <button className="ebtn sc" onClick={shareWhatsapp}>{IC.chat} Comparteix per WhatsApp</button>
                <button className="ebtn sc" onClick={copyList}>{IC.copy} Copia al porta-retalls</button>
              </div>
              {allWines.length>0 && (
                <div className="ecard">
                  <div className="slbl" style={{ padding:"0 0 10px" }}>Previsualitzacio</div>
                  <div className="prevbox">
                    {allWines.map(function(w,i){ return (
                      <div key={w.id} className="prevrow">
                        <div><div className="pwine">{i+1}. {w.name}</div><div className="pwinery">{w.winery}</div></div>
                        <div className="pstars">{w.rating?"★".repeat(w.rating):"–"}</div>
                      </div>
                    ); })}
                  </div>
                </div>
              )}
            </div>
          )}

          {tab==="perfil" && (
            <div className="prwrap" style={{ marginTop:16 }}>
              <div className="prcard">
                <div className="prav">{userAvatar?<img src={userAvatar} alt={userName}/>:userInitial}</div>
                <div className="prname">{userName}</div>
                <div className="premail">{user.email}</div>
                <div className="strow">
                  <div className="stbox"><div className="stnum">{allWines.length}</div><div className="stlbl">Vins</div></div>
                  <div className="stbox"><div className="stnum">{wineriesWithWines}</div><div className="stlbl">Cellers</div></div>
                  <div className="stbox"><div className="stnum am">{avgRating}</div><div className="stlbl">Mitjana</div></div>
                </div>
                <button className="logbtn" onClick={logout}>{IC.logout} Tanca la sessio</button>
              </div>
              <div className="badge">
                <p><strong>Que Rebenti La Baells</strong>Fira del Vi · 17 de maig de 2026<br/>40 cellers participants</p>
              </div>
            </div>
          )}
        </div>

        <div className="tabbar">
          {tabs.map(function(t){ return (
            <button key={t.id} className={"tab "+(tab===t.id&&!selected?"on":"off")}
              onClick={function(){ setTab(t.id); setSelected(null); }}>
              {t.icon}
              <span className="tab-lbl">{t.label}</span>
            </button>
          ); })}
        </div>

        {toast && <div className="toast">{toast}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
